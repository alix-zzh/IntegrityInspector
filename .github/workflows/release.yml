name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  release:
    name: Release jar and bump version
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip release]')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_APP_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Python for version bump
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "GPG_PRIVATE_KEY secret is required to sign release commits." >&2
            exit 1
          fi

          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Configure git user
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
        run: |
          if [ -z "$GPG_SIGNING_KEY" ]; then
            echo "GPG_SIGNING_KEY secret is required to sign release commits." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config commit.gpgsign true
          git config user.signingkey "$GPG_SIGNING_KEY"
          git config gpg.program gpg
          if [ -n "$GPG_PASSPHRASE" ]; then
            git config gpg.program "$(pwd)/.github-gpg-sign"
            cat > .github-gpg-sign <<'SH'
          #!/usr/bin/env sh
          exec gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" "$@"
          SH
            chmod +x .github-gpg-sign
          fi

      - name: Resolve release version
        id: version
        run: |
          CURRENT_VERSION="$(mvn -q -DforceStdout help:evaluate '-Dexpression=project.version')"
          RELEASE_VERSION="${CURRENT_VERSION%-SNAPSHOT}"
          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "release=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Normalize pom to release version
        if: steps.version.outputs.current != steps.version.outputs.release
        run: |
          mvn -B -ntp versions:set \
            -DnewVersion=${{ steps.version.outputs.release }} \
            -DgenerateBackupPoms=false
          git add pom.xml
          git commit -m "chore(release): prepare v${{ steps.version.outputs.release }} [skip release]"
          git push origin HEAD:master

      - name: Build release artifact
        run: mvn -B -ntp package

      - name: Resolve release commit
        id: release-commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: integrity-inspector-${{ steps.version.outputs.release }}
          path: target/integrity-inspector-${{ steps.version.outputs.release }}.jar
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.release }}
          name: IntegrityInspector v${{ steps.version.outputs.release }}
          target_commitish: ${{ steps.release-commit.outputs.sha }}
          generate_release_notes: true
          files: target/integrity-inspector-${{ steps.version.outputs.release }}.jar

      - name: Bump master to next snapshot
        run: |
          NEXT_VERSION="$(python - <<'PY'
          version = "${{ steps.version.outputs.release }}"
          parts = version.split(".")
          if len(parts) != 3 or not all(part.isdigit() for part in parts):
              raise SystemExit(f"Unsupported version format: {version}")
          major, minor, patch = map(int, parts)
          print(f"{major}.{minor}.{patch + 1}-SNAPSHOT")
          PY
          )"
          mvn -B -ntp versions:set \
            -DnewVersion="$NEXT_VERSION" \
            -DgenerateBackupPoms=false
          git add pom.xml
          git commit -m "chore: bump version to $NEXT_VERSION [skip release]"
          git push origin HEAD:master
